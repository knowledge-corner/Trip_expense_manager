{% extends "base.html" %}
{% block title %}Home - TripWallet{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
  <h2 class="fw-bold">My Trips</h2>
  <a href="{% url 'trips:trip_create' %}" class="btn btn-primary"><i class="bi bi-plus-circle"></i> New Trip</a>
</div>

<div class="row g-3 mb-4">
  <div class="col-md-3">
    <input type="text" id="f-search" class="form-control" placeholder="Search trip name / destination">
  </div>
  <div class="col-md-2">
    <select id="f-year" class="form-select"><option value="">All Years</option></select>
  </div>
  <div class="col-md-2">
    <select id="f-state" class="form-select"><option value="">All States</option></select>
  </div>
  <div class="col-md-2">
    <select id="f-status" class="form-select">
      <option value="">All Status</option>
      <option value="upcoming">Upcoming</option>
      <option value="ongoing">Ongoing</option>
      <option value="completed">Completed</option>
    </select>
  </div>
  <div class="col-md-2">
    <select id="f-ordering" class="form-select">
      <option value="-start_date">Newest first</option>
      <option value="start_date">Oldest first</option>
      <option value="-budget">Budget high-low</option>
    </select>
  </div>
  <div class="col-md-1 d-grid">
    <button class="btn btn-outline-secondary" onclick="loadTrips()"><i class="bi bi-search"></i></button>
  </div>
</div>

<div id="trip-list" class="row g-4">
  <p class="text-muted">Loading trips...</p>
</div>
{% endblock %}

{% block extra_js %}
<script src="/static/js/home.js"></script>
{% endblock %}
