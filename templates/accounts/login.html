{% extends "base.html" %}
{% block title %}Login - TripWallet{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card p-4 shadow-sm">
      <h3 class="mb-3 fw-bold">Login</h3>
      <form method="post">
        {% csrf_token %}
        {% if form.errors %}<div class="alert alert-danger">Invalid username or password.</div>{% endif %}
        <div class="mb-3">
          <label class="form-label">Username</label>
          {{ form.username }}
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          {{ form.password }}
        </div>
        <button type="submit" class="btn btn-primary w-100">Login</button>
      </form>
      <p class="mt-3 text-center">No account? <a href="{% url 'accounts:signup' %}">Sign up</a></p>
    </div>
  </div>
</div>
{% endblock %}
